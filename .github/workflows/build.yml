name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore tucao.keystore -alias tucao -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass tucao123 -keypass tucao123 \
            -dname "CN=吐槽日记, OU=App, O=TucaoDiary, L=Beijing, ST=Beijing, C=CN"

      - name: Sign APK
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks tucao.keystore \
            --ks-pass pass:tucao123 \
            --ks-key-alias tucao \
            --key-pass pass:tucao123 \
            --out app/build/outputs/apk/release/tucao-diary-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
          ls -lh app/build/outputs/apk/release/tucao-diary-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tucao-diary
          path: app/build/outputs/apk/release/tucao-diary-signed.apk
