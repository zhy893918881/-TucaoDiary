name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: chmod +x gradlew 2>/dev/null; ./gradlew assembleRelease

      - name: Sign APK (debug sign)
        run: |
          if [ -f app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
              --ks $ANDROID_HOME/debug.keystore \
              --ks-pass pass:android \
              --ks-key-alias androiddebugkey \
              --key-pass pass:android \
              --out app/build/outputs/apk/release/tucao-diary.apk \
              app/build/outputs/apk/release/app-release-unsigned.apk
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tucao-diary
          path: app/build/outputs/apk/release/tucao-diary.apk
